<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Eclipse — Roblox Scripts</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Oxanium:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    /* ── Tokens ───────────────────────────────────────────── */
    :root {
      --bg:          #07090d;
      --bg-card:     #0c0f15;
      --bg-code:     #080a0e;
      --border:      #161c27;
      --border-hl:   #243040;
      --accent:      #00ffcc;
      --accent-dim:  rgba(0,255,204,0.12);
      --accent-glow: rgba(0,255,204,0.25);
      --red:         #ff4466;
      --red-dim:     rgba(255,68,102,0.12);
      --gold:        #ffc24a;
      --gold-dim:    rgba(255,194,74,0.12);
      --purple:      #b57bff;
      --purple-dim:  rgba(181,123,255,0.12);
      --green:       #39e88f;
      --green-dim:   rgba(57,232,143,0.12);
      --white:       #e8eaf0;
      --white-dim:   rgba(232,234,240,0.08);   /* FIX: was missing, broke UPDATED badge */
      --text:        #dde4f0;
      --text-muted:  #4e6070;
      --text-dim:    #222c38;
      --mono:        'Share Tech Mono', monospace;
      --display:     'Oxanium', sans-serif;
      --r:           10px;
    }

    /* ── Reset ────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--display);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── Animated BG grid ─────────────────────────────────── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,255,204,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,255,204,0.025) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
      z-index: 0;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse 70% 50% at 50% 0%, rgba(0,255,204,0.055) 0%, transparent 65%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── Header ───────────────────────────────────────────── */
    header {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 5rem 1.5rem 2.5rem;
    }

    .logo {
      display: inline-block;
      font-size: 2.4rem;
      color: var(--accent);
      filter: drop-shadow(0 0 14px var(--accent-glow));
      animation: breathe 4s ease-in-out infinite;
      margin-bottom: 0.6rem;
    }

    @keyframes breathe {
      0%,100% { filter: drop-shadow(0 0 10px var(--accent-glow)); }
      50%      { filter: drop-shadow(0 0 26px var(--accent-glow)) drop-shadow(0 0 50px rgba(0,255,204,0.1)); }
    }

    h1 {
      font-family: var(--display);
      font-size: clamp(2.6rem, 7vw, 5rem);
      font-weight: 800;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      background: linear-gradient(140deg, #fff 20%, var(--accent) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
    }

    .tagline {
      margin-top: 0.9rem;
      font-size: 1rem;
      color: var(--text-muted);
      font-weight: 400;
      letter-spacing: 0.04em;
    }

    .stats {
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      margin-top: 1.4rem;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 0.45rem 1.2rem;
      font-family: var(--mono);
      font-size: 0.75rem;
      color: var(--text-muted);
    }

    .stats span { color: var(--accent); }
    .stats .dot { color: var(--text-dim); }

    /* ── Social links ─────────────────────────────────────── */
    .social-bar {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.65rem;
      margin-top: 1.1rem;
    }

    .social-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 7px;
      color: var(--text-muted);
      font-family: var(--mono);
      font-size: 0.7rem;
      padding: 0.38rem 0.85rem;
      text-decoration: none;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
      letter-spacing: 0.04em;
    }

    .social-btn:hover { background: rgba(255,255,255,0.07); color: var(--text); border-color: var(--border-hl); }

    .social-btn.discord:hover {
      background: rgba(88,101,242,0.15);
      border-color: rgba(88,101,242,0.4);
      color: #7289da;
    }

    .social-btn.github:hover {
      background: rgba(255,255,255,0.08);
      border-color: rgba(255,255,255,0.2);
      color: #fff;
    }

    /* ── Grid ─────────────────────────────────────────────── */
    .grid {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 1.1rem;
      max-width: 1180px;
      margin: 0 auto;
      padding: 0 1.25rem 5rem;
    }

    /* ── Card ─────────────────────────────────────────────── */
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 1.4rem 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 0.95rem;
      position: relative;
      overflow: hidden;
      transition: border-color 0.2s, box-shadow 0.2s, transform 0.18s;
      animation: fadeUp 0.5s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 10%; right: 10%;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      opacity: 0;
      transition: opacity 0.3s;
    }

    .card:hover {
      border-color: var(--border-hl);
      box-shadow: 0 0 0 1px rgba(0,255,204,0.05), 0 12px 40px rgba(0,0,0,0.5);
      transform: translateY(-3px);
    }

    .card:hover::before { opacity: 1; }

    .card:nth-child(1) { animation-delay: 0.05s; }
    .card:nth-child(2) { animation-delay: 0.10s; }
    .card:nth-child(3) { animation-delay: 0.15s; }
    .card:nth-child(4) { animation-delay: 0.20s; }
    .card:nth-child(5) { animation-delay: 0.25s; }
    .card:nth-child(6) { animation-delay: 0.30s; }
    .card:nth-child(7) { animation-delay: 0.35s; }
    .card:nth-child(8) { animation-delay: 0.40s; }

    /* ── Card header ──────────────────────────────────────── */
    .card-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.75rem;
    }

    .game-name {
      font-family: var(--display);
      font-size: 1.4rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #fff;
    }

    .desc {
      font-size: 0.84rem;
      color: var(--text-muted);
      margin-top: -0.45rem;
      font-weight: 400;
    }

    /* ── Badges ───────────────────────────────────────────── */
    .badge {
      font-family: var(--mono);
      font-size: 0.62rem;
      letter-spacing: 0.1em;
      padding: 0.2rem 0.55rem;
      border-radius: 4px;
      flex-shrink: 0;
    }
    /* FIX: all badge keys now uppercase to match BADGE_CLASS lookup */
    .badge-new     { background: var(--accent-dim);  color: var(--accent);  border: 1px solid rgba(0,255,204,0.25); }
    .badge-op      { background: var(--red-dim);     color: var(--red);     border: 1px solid rgba(255,68,102,0.25); }
    .badge-free    { background: var(--green-dim);   color: var(--green);   border: 1px solid rgba(57,232,143,0.25); }
    .badge-updated { background: var(--white-dim);   color: var(--white);   border: 1px solid rgba(232,234,240,0.2); }
    .badge-paid    { background: var(--gold-dim);    color: var(--gold);    border: 1px solid rgba(255,194,74,0.25); }

    /* ── Section ──────────────────────────────────────────── */
    .section { display: flex; flex-direction: column; gap: 0.4rem; }

    .label {
      font-family: var(--mono);
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    /* ── Code row ─────────────────────────────────────────── */
    .code-row {
      display: flex;
      align-items: center;
      gap: 0.45rem;
      background: var(--bg-code);
      border: 1px solid var(--border);
      border-radius: 7px;
      padding: 0.48rem 0.55rem 0.48rem 0.8rem;
    }

    .code-text {
      font-family: var(--mono);
      font-size: 0.7rem;
      color: var(--accent);
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .code-text.key { color: var(--purple); }

    /* ── Buttons ──────────────────────────────────────────── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 5px;
      color: var(--text-muted);
      font-family: var(--mono);
      font-size: 0.65rem;
      padding: 0.28rem 0.6rem;
      cursor: pointer;
      flex-shrink: 0;
      text-decoration: none;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
      white-space: nowrap;
      line-height: 1;
    }

    .btn:hover {
      background: var(--accent-dim);
      border-color: rgba(0,255,204,0.3);
      color: var(--accent);
    }

    .btn.copied {
      background: var(--green-dim);
      border-color: rgba(57,232,143,0.35);
      color: var(--green);
    }

    .btn-open:hover {
      background: var(--purple-dim);
      border-color: rgba(181,123,255,0.3);
      color: var(--purple);
    }

    /* ── Footer ───────────────────────────────────────────── */
    footer {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 1.5rem 1rem 2.5rem;
      border-top: 1px solid var(--border);
      font-family: var(--mono);
      font-size: 0.72rem;
      color: var(--text-dim);
    }

    footer a {
      color: var(--text-muted);
      text-decoration: none;
      transition: color 0.15s;
    }
    footer a:hover { color: var(--accent); }

    /* ── Responsive ───────────────────────────────────────── */
    @media (max-width: 480px) {
      .grid { grid-template-columns: 1fr; }
      header { padding: 3.5rem 1rem 2rem; }
      .social-bar { flex-wrap: wrap; }
    }
  </style>
</head>
<body>

  <header>
    <div class="logo">⬡</div>
    <h1>Eclipse</h1>
    <p class="tagline">Premium Roblox scripts — grab your key, execute, dominate.</p>

    <div class="stats">
      <span id="script-count">0</span> Scripts
      <span class="dot">·</span>
      Always Updated
      <span class="dot">·</span>
      Free to Use
    </div>

    <!-- ============================================================
         SOCIAL LINKS — swap the href values with your real URLs
    ============================================================ -->
    <div class="social-bar">
      <a class="social-btn discord"
         href="https://discord.gg/REPLACE_ME"
         target="_blank" rel="noopener noreferrer">
        <!-- Discord icon -->
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
          <path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057c.002.022.015.043.031.054a19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028c.462-.63.874-1.295 1.226-1.994a.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.956-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.956 2.418-2.157 2.418zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.946 2.418-2.157 2.418z"/>
        </svg>
        Discord
      </a>

      <a class="social-btn github"
         href="https://github.com/REPLACE_ME"
         target="_blank" rel="noopener noreferrer">
        <!-- GitHub icon -->
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0 1 12 6.844a9.59 9.59 0 0 1 2.504.337c1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.02 10.02 0 0 0 22 12.017C22 6.484 17.522 2 12 2z"/>
        </svg>
        GitHub
      </a>
    </div>
  </header>

  <main class="grid" id="grid"></main>

  <footer>
    Eclipse · Best Roblox Scripts ·
    <a href="https://discord.gg/REPLACE_ME" target="_blank" rel="noopener noreferrer">Discord</a> ·
    <a href="https://github.com/REPLACE_ME" target="_blank" rel="noopener noreferrer">GitHub</a>
  </footer>

  <script>
    // ============================================================
    //  SCRIPTS DATA — edit this array to add / remove / update
    // ============================================================
    //
    //  Fields:
    //    game        — card title
    //    script      — the loadstring users will copy
    //    keyUrl      — work.ink URL  (set to "" to hide the key row)
    //    description — optional subtitle  (set to "" to hide)
    //    badge       — "NEW" | "OP" | "FREE" | "UPDATED" | "PAID" | ""
    //
    // ============================================================

    const SCRIPTS = [
      {
        game:        "Eclipse",
        script:      `loadstring(game:HttpGet("https://example.com/eclipse.lua"))()`,
        keyUrl:      "https://work.ink/your-eclipse-key",
        description: "Full ESP, Silent Aim, and Aimbot",
        badge:       "PAID",   // FIX: must be uppercase to match BADGE_CLASS keys
      },
    ];

    // ── Render ───────────────────────────────────────────────────

    // FIX: all keys are uppercase — badge values in SCRIPTS must match exactly
    const BADGE_CLASS = {
      NEW:     "badge-new",
      OP:      "badge-op",
      FREE:    "badge-free",
      UPDATED: "badge-updated",
      PAID:    "badge-paid",
    };

    const COPY_ICON = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>`;
    const CHECK_ICON = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>`;
    const OPEN_ICON  = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>`;

    function buildCard(data, index) {
      const card = document.createElement("div");
      card.className = "card";
      card.style.animationDelay = `${0.05 + index * 0.05}s`;

      const head = document.createElement("div");
      head.className = "card-head";

      const name = document.createElement("div");
      name.className = "game-name";
      name.textContent = data.game;
      head.appendChild(name);

      // FIX: normalise to uppercase before lookup so "Paid" and "PAID" both work
      const badgeKey = (data.badge || "").toUpperCase();
      if (badgeKey && BADGE_CLASS[badgeKey]) {
        const badge = document.createElement("span");
        badge.className = `badge ${BADGE_CLASS[badgeKey]}`;
        badge.textContent = data.badge;
        head.appendChild(badge);
      }

      card.appendChild(head);

      if (data.description) {
        const desc = document.createElement("p");
        desc.className = "desc";
        desc.textContent = data.description;
        card.appendChild(desc);
      }

      card.appendChild(buildCodeRow("Get Script", data.script, "script", null));

      if (data.keyUrl) {
        card.appendChild(buildCodeRow("Get Key", data.keyUrl, "key", data.keyUrl));
      }

      return card;
    }

    function buildCodeRow(labelText, value, type, linkUrl) {
      const section = document.createElement("div");
      section.className = "section";

      const label = document.createElement("span");
      label.className = "label";
      label.textContent = labelText;
      section.appendChild(label);

      const row = document.createElement("div");
      row.className = "code-row";

      const code = document.createElement("span");
      code.className = `code-text${type === "key" ? " key" : ""}`;
      code.textContent = value;
      row.appendChild(code);

      if (linkUrl) {
        const openBtn = document.createElement("a");
        openBtn.className = "btn btn-open";
        openBtn.href = linkUrl;
        openBtn.target = "_blank";
        openBtn.rel = "noopener noreferrer";
        openBtn.innerHTML = `${OPEN_ICON} Open`;
        row.appendChild(openBtn);
      }

      const copyBtn = document.createElement("button");
      copyBtn.className = "btn";
      copyBtn.innerHTML = `${COPY_ICON} Copy`;
      copyBtn.addEventListener("click", () => {
        navigator.clipboard.writeText(value).then(() => {
          copyBtn.innerHTML = `${CHECK_ICON} Copied!`;
          copyBtn.classList.add("copied");
          setTimeout(() => {
            copyBtn.innerHTML = `${COPY_ICON} Copy`;
            copyBtn.classList.remove("copied");
          }, 2000);
        });
      });
      row.appendChild(copyBtn);

      section.appendChild(row);
      return section;
    }

    const grid = document.getElementById("grid");
    SCRIPTS.forEach((s, i) => grid.appendChild(buildCard(s, i)));
    document.getElementById("script-count").textContent = SCRIPTS.length;
  </script>

</body>
</html>
